<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline - AttendanceDash Pro</title>
  <style>
    :root {
      --surface: #121212;
      --text: #f3f4f6;
      --text2: #9ca3af;
      --accent: #3b82f6;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--surface);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 12px;
    }
    p {
      color: var(--text2);
      font-size: 15px;
      max-width: 300px;
      line-height: 1.5;
      margin: 0 0 32px;
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 9.86a10.94 10.94 0 0 0 3.98 2.08M8.5 16.5a7.02 7.02 0 0 0 7 0M12 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"></path>
  </svg>
  <h1>You are offline</h1>
  <p>AttendanceDash Pro requires an active internet connection to load cloud data and synchronize attendance.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
